#
# Build_imm_高通410系列.yml
#

name: Build_imm_高通410系列

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: ' ← 选择是否开启 SSH 调试专业人员使用'
        required: false
        default: false
        type: boolean
      profile:
        description: ' ↓ 支持多款型号 手动选择要编译的机型 ↓ '
        type: choice
        options:
          - jz02v10
          - ufi001c
          - ufi001b
          - ufi103s
          - qrzl903
          - w001
          - ufi003
          - uz801
          - mf32
          - mf601
          - wf2
          - sp970v11
          - sp970v10
        default: jz02v10
        required: true

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: v24.10.5
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ${{ format('config/{0}.config', github.event.inputs.profile) }}
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest  
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Show hardware info
      run: |
        chmod 755 ./scripts/show_hardware_info.sh
        ./scripts/show_hardware_info.sh
  
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
        
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/refs/heads/main/depend_ubuntu2204_openwrt)
        wget https://raw.githubusercontent.com/xuxin1955/depend_ubuntu2204_openwrt/main/mkbootimg_10.0.0+r36-9_all.deb
        sudo dpkg -i mkbootimg_10.0.0+r36-9_all.deb
        sudo apt-get install -f -y
        # 验证安装
        mkbootimg --help || true
        MKBOOTIMG_PATH=$(which mkbootimg)
        if [ -n "$MKBOOTIMG_PATH" ]; then
          echo "mkbootimg found at: $MKBOOTIMG_PATH"
        else
          echo "❌ mkbootimg not found!"
        fi
        sudo timedatectl set-timezone "$TZ"
        sudo chmod 777 /mnt
        
    - name: Ensure Python build tools
      run: |
       python3 -m pip install --upgrade pip
       python3 -m pip install --upgrade setuptools wheel cython packaging tomli pyelftools Unidecode

    - name: Clone source code
      working-directory: /mnt
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a -f

    - name: Load custom configuration
      run: |
        [ -d files ] && cp -r files openwrt/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
    - name: SSH 调试
      uses: mxschmitt/action-tmate@master
      if: ${{ inputs.ssh || contains(github.event.action, 'ssh') }}
      
    - name: Config defconfig
      run: |
       cd openwrt
       make defconfig
       
    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 查看并提取精简配置
      continue-on-error: true
      run: |
        cd openwrt
        echo "--- 当前 openwrt 目录内容 ---"
        ls -la
        if [ -f .config ]; then
          echo "--- 正在提取精简配置到 seed.config ---"
          grep '^CONFIG_' .config > seed.config
        else
          echo "Error: .config not found"
        fi

    - name: 自动上传编译配置 (Artifacts)
      uses: actions/upload-artifact@main
      with:
       name: build-config-${{ github.event.inputs.profile }}
       path: |
         openwrt/.config
         openwrt/seed.config
       include-hidden-files: true

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "## Immortalwrt 24.10 高通410系列" > release.txt
        echo "- 管理地址: 192.168.1.1" >> release.txt
        echo "- 内核版本: 6.6.X" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      if: steps.tag.outputs.status == 'success' && !cancelled()
      uses: ncipollo/release-action@main
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        bodyFile: release.txt
        artifacts: ${{ env.FIRMWARE }}/*
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete old runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3
